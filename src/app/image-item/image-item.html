<div
  class="image-card"
  [class.featured]="isFeatured()"
  [class.selected]="isSelected()"
  (click)="onImageClick()">

  <img
    [src]="image().src"
    [alt]="image().alt"
  >

  <p>{{ image().alt }}</p>

  <button type="button" class="btn-delete" (click)="onDeleteClick($event)">
    🗑 Borrar
  </button>

</div>
